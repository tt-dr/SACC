services:
  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-sacc-api}
      APP_ENV: ${APP_ENV:-production}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-please_change_this_to_a_very_long_random_string}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-12h}
      MYSQL_DSN: sacc:${MYSQL_PASSWORD:-sacc_password}@tcp(mysql:3306)/sacc?charset=utf8mb4&parseTime=True&loc=Local
      MYSQL_MAX_OPEN_CONNS: ${MYSQL_MAX_OPEN_CONNS:-25}
      MYSQL_MAX_IDLE_CONNS: ${MYSQL_MAX_IDLE_CONNS:-10}
      MYSQL_MAX_IDLE_TIME: ${MYSQL_MAX_IDLE_TIME:-5m}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-15}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-30}
      SEED_ENABLED: ${SEED_ENABLED:-true}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe_Strong_Password_123}
      SEED_ADMIN_DISPLAY_NAME: ${SEED_ADMIN_DISPLAY_NAME:-Super Admin}
      SEED_ADMIN_ROLE: ${SEED_ADMIN_ROLE:-super_admin}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sacc_net

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: sacc
      MYSQL_USER: sacc
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sacc_password}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sacc_net

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - sacc_net

  nginx:
    build:
      context: ..
      dockerfile: deploy/docker/nginx.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - sacc_net

networks:
  sacc_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
